version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: automated_sales_db
    environment:
      POSTGRES_USER: sales_agent
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: sales_agent_db
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
